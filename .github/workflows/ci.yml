name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: Build / Test / Lint
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: |
          if bun -e "const pkg = JSON.parse(await Bun.file('package.json').text()); process.exit(pkg.scripts?.lint ? 0 : 1)"; then
            bun run lint
          else
            echo "No lint script configured; skipping."
          fi

      - name: Build
        run: |
          if bun -e "const pkg = JSON.parse(await Bun.file('package.json').text()); process.exit(pkg.scripts?.build ? 0 : 1)"; then
            bun run build
          else
            echo "No build script configured; skipping."
          fi

      - name: Test
        run: |
          if bun -e "const pkg = JSON.parse(await Bun.file('package.json').text()); process.exit(pkg.scripts?.test ? 0 : 1)"; then
            bun run test
          else
            echo "No test script configured; skipping."
          fi

      - name: Upload test artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_id }}
          path: |
            coverage/**
            test-results/**
          if-no-files-found: ignore
